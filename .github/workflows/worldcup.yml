name: Update World Cup 2026 dashboard

on:
  schedule:
    # Every 3 hours (UTC): 00:00, 03:00, 06:00 ... 21:00 — eight runs a day.
    # GitHub runs scheduled jobs in UTC and may delay them under load. The job
    # only commits when a score actually changes, so the extra runs are free
    # no-ops; the real freshness limit is how often the openfootball source
    # itself updates (a few times a day).
    - cron: "0 */3 * * *"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # needed to commit the refreshed data back

concurrency:
  group: worldcup-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch results and rebuild data
        shell: pwsh            # PowerShell 7 is preinstalled on the runner
        run: ./worldcup-2026/scripts/update.ps1

      - name: Commit data if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-2026/data/standings.json worldcup-2026/data/matches.json
          if git diff --staged --quiet; then
            echo "No score changes today."
          else
            git commit -m "Update World Cup standings ($(date -u +%Y-%m-%d))"
            git push
          fi
