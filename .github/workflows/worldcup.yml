name: Update World Cup 2026 dashboard

on:
  schedule:
    # Four times a day (UTC). UK is +1 during the tournament, so these land at
    # 08:00, 14:00, 20:00 and 00:00 UK — the 08:00 run scoops up the overnight
    # games. GitHub runs scheduled jobs in UTC and may delay them under load.
    # The job only commits when a score actually changes, so the extra runs are
    # free no-ops the rest of the time.
    - cron: "0 7,13,19,23 * * *"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # needed to commit the refreshed data back

concurrency:
  group: worldcup-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch results and rebuild data
        shell: pwsh            # PowerShell 7 is preinstalled on the runner
        run: ./worldcup-2026/scripts/update.ps1

      - name: Commit data if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup-2026/data/standings.json worldcup-2026/data/matches.json
          if git diff --staged --quiet; then
            echo "No score changes today."
          else
            git commit -m "Update World Cup standings ($(date -u +%Y-%m-%d))"
            git push
          fi
