<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup 2026 — Goals Draw</title>
<style>
  :root {
    /* FIFA World Cup 26 palette */
    --blue:   #2747e6;
    --teal:   #12cdbd;
    --orange: #ff5a1f;
    --gold:   #f5b400;
    --ink:    #0e1b2e;
    --muted:  #62748c;
    --line:   #e4eaf2;
    --card:   #ffffff;
    --shadow: 0 10px 30px rgba(20,40,80,.10);
    --shadow-sm: 0 2px 8px rgba(20,40,80,.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(900px 500px at 8% 0%, rgba(39,71,230,.14), transparent 60%),
      radial-gradient(900px 600px at 95% 8%, rgba(255,90,31,.13), transparent 55%),
      radial-gradient(1000px 700px at 50% 100%, rgba(18,205,189,.16), transparent 60%),
      #f3f7fc;
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 18px 14px 64px; }

  /* hero banner */
  .hero {
    border-radius: 20px; padding: 26px 20px; text-align: center; color: #fff;
    background: linear-gradient(102deg, var(--blue) 0%, var(--teal) 52%, var(--orange) 100%);
    box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(420px 200px at 50% -40%, rgba(255,255,255,.45), transparent 70%);
    pointer-events: none;
  }
  .hero .kick { font-size: 34px; line-height: 1; filter: drop-shadow(0 3px 6px rgba(0,0,0,.25)); }
  .hero h1 { margin: 8px 0 2px; font-size: 27px; font-weight: 900; letter-spacing: .4px; text-shadow: 0 2px 10px rgba(0,0,0,.18); }
  .hero .sub { font-size: 13.5px; opacity: .95; font-weight: 600; }
  .hero .tag {
    display: inline-block; margin-top: 12px; font-size: 11px; font-weight: 800; letter-spacing: 1.4px;
    text-transform: uppercase; background: rgba(255,255,255,.22); padding: 5px 12px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,.4);
  }

  .status { display: flex; gap: 9px; justify-content: center; flex-wrap: wrap; margin: 16px 0 18px; }
  .pill {
    background: var(--card); border: 1px solid var(--line); padding: 6px 13px; border-radius: 999px;
    font-size: 12.5px; color: var(--muted); box-shadow: var(--shadow-sm);
  }
  .pill b { color: var(--ink); font-weight: 800; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); overflow: hidden; }
  .card + .card { margin-top: 16px; }
  .card h2 {
    margin: 0; padding: 15px 18px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 800; color: var(--ink); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .card h2::before { content: ""; width: 5px; height: 17px; border-radius: 3px; background: linear-gradient(var(--blue), var(--teal)); }
  .card.fxcard h2::before { background: linear-gradient(var(--orange), var(--gold)); }

  /* flags */
  .flag {
    width: 22px; height: 22px; border-radius: 50%; object-fit: cover; background: #eef2f7;
    box-shadow: 0 0 0 1px rgba(14,27,46,.12), 0 1px 2px rgba(14,27,46,.18); flex: 0 0 auto;
  }
  .flag.lg { width: 27px; height: 27px; }
  .flag.ph { background: repeating-linear-gradient(45deg,#e4eaf2,#e4eaf2 4px,#eef2f7 4px,#eef2f7 8px); }

  /* league table */
  .row {
    display: grid; grid-template-columns: 38px 1fr auto auto; align-items: center; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s;
    width: 100%; background: none; border-left: 0; border-right: 0; border-top: 0; text-align: left; font: inherit; color: inherit;
  }
  .row:last-of-type { border-bottom: 0; }
  .row:hover { background: #f7faff; }
  .rankb {
    width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: #fff; box-shadow: var(--shadow-sm);
    background: linear-gradient(135deg, var(--blue), var(--teal));
  }
  .rankb.r1 { background: linear-gradient(135deg, #ffd34d, var(--gold)); color: #5a3d00; }
  .rankb.r2 { background: linear-gradient(135deg, #d7e0ea, #9fb0c4); color: #2c3a4d; }
  .rankb.r3 { background: linear-gradient(135deg, #ffb06b, #e07a3f); }
  .pname { font-weight: 800; font-size: 18px; display: flex; align-items: center; gap: 9px; }
  .chev { color: var(--muted); transition: transform .18s; font-size: 11px; }
  .row[aria-expanded="true"] .chev { transform: rotate(90deg); }
  .row[aria-expanded="true"] { background: #f7faff; }
  .goals { font-weight: 900; font-size: 22px; font-variant-numeric: tabular-nums; color: var(--blue); }
  .goals small { font-size: 10px; color: var(--muted); font-weight: 700; display: block; text-align: right; text-transform: uppercase; letter-spacing: .5px; }
  .left { font-size: 12px; color: var(--muted); text-align: right; min-width: 62px; font-weight: 600; }
  .left b { color: var(--orange); font-size: 16px; font-weight: 900; }

  .detail { display: none; padding: 6px 14px 16px; background: #f5f8fd; border-bottom: 1px solid var(--line); }
  .detail.open { display: block; }
  .teamgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 9px; }
  .team {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 9px 12px; box-shadow: var(--shadow-sm);
  }
  .team .tn { font-size: 13.5px; font-weight: 700; line-height: 1.2; }
  .team .meta { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .team .tg { margin-left: auto; font-weight: 900; font-size: 18px; font-variant-numeric: tabular-nums; color: var(--ink); }
  .team.out { opacity: .5; }
  .team.out .tn { text-decoration: line-through; }
  .badge-out { font-size: 8.5px; letter-spacing: .5px; background: var(--muted); color: #fff; border-radius: 4px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; font-weight: 800; }

  /* fixtures */
  .fx { padding: 6px 18px 12px; }
  .fixrow { display: grid; grid-template-columns: 64px 1fr auto; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .fixrow:last-child { border-bottom: 0; }
  .fxtime { font-size: 12.5px; color: var(--ink); font-weight: 700; line-height: 1.5; }
  .stage { display: inline-block; font-size: 9.5px; font-weight: 800; letter-spacing: .4px; text-transform: uppercase;
           padding: 2px 7px; border-radius: 999px; background: rgba(18,205,189,.16); color: #0a8c80; margin-top: 3px; }
  .stage.ko { background: rgba(255,90,31,.15); color: #d8430f; }
  .teams2 .tl { display: flex; align-items: center; gap: 8px; padding: 2px 0; font-size: 14.5px; font-weight: 600; }
  .teams2 .own { color: var(--muted); font-size: 11.5px; font-weight: 600; }
  .score { font-weight: 900; font-size: 18px; font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; color: var(--ink); }
  .score.vs { color: var(--muted); font-weight: 700; font-size: 13px; }
  .score .pens { display: block; font-size: 10px; color: var(--muted); font-weight: 700; }
  .empty { color: var(--muted); padding: 18px; font-size: 14px; text-align: center; }

  footer { color: var(--muted); font-size: 11.5px; text-align: center; margin-top: 26px; line-height: 1.8; }
  footer a { color: var(--blue); font-weight: 600; }
  .err { background: #fff2f2; border: 1px solid #ffc9c9; color: #b42318; padding: 14px; border-radius: 12px; margin: 14px; }

  @media (max-width: 460px) {
    .hero h1 { font-size: 23px; }
    .goals { font-size: 19px; }
    .pname { font-size: 16px; }
    .teamgrid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="kick">⚽🏆</div>
    <h1>World Cup 2026</h1>
    <div class="sub">Whoever's teams score the most goals wins</div>
    <div class="tag">Goals Draw</div>
  </header>

  <div class="status" id="status"></div>

  <section class="card fxcard">
    <h2 id="fxtitle">Today's fixtures</h2>
    <div class="fx" id="fixtures"><div class="empty">Loading…</div></div>
  </section>

  <section class="card">
    <h2>League table</h2>
    <div id="table"><div class="empty">Loading…</div></div>
  </section>

  <section class="card" id="unassigned-card" style="display:none">
    <h2>Unassigned — not competing</h2>
    <div id="unassigned"></div>
  </section>

  <footer>
    <div>Goals counted: own goals ✓ &nbsp;·&nbsp; extra time ✓ &nbsp;·&nbsp; penalty shootouts ✗</div>
    <div>Updated daily at lunchtime · Data: <a href="https://github.com/openfootball/worldcup.json" target="_blank" rel="noopener">openfootball</a> · Flags: <a href="https://github.com/lipis/flag-icons" target="_blank" rel="noopener">flag-icons</a></div>
  </footer>
</div>

<script>
const bust = "?v=" + Date.now();
const opts = { cache: "no-store" };

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

function flag(code, lg) {
  const cls = "flag" + (lg ? " lg" : "");
  if (!code) return `<span class="${cls} ph"></span>`;
  return `<img class="${cls}" src="./flags/${esc(code)}.svg" alt="" onerror="this.classList.add('ph');this.removeAttribute('src')">`;
}

function timeAgo(iso) {
  const then = new Date(iso).getTime();
  if (isNaN(then)) return "";
  const mins = Math.round((Date.now() - then) / 60000);
  if (mins < 2) return "just now";
  if (mins < 60) return mins + " min ago";
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + (hrs === 1 ? " hour ago" : " hours ago");
  const days = Math.round(hrs / 24);
  return days + (days === 1 ? " day ago" : " days ago");
}

function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function localKickoff(dateStr, timeStr) {
  if (!dateStr || !timeStr) return null;
  const mt = timeStr.match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d{1,2})/);
  const dm = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!mt || !dm) return null;
  const utcHour = parseInt(mt[1], 10) - parseInt(mt[3], 10);
  const d = new Date(Date.UTC(+dm[1], +dm[2] - 1, +dm[3], utcHour, +mt[2]));
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDate(dateStr) {
  const dm = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!dm) return dateStr;
  return new Date(+dm[1], +dm[2] - 1, +dm[3]).toLocaleDateString([], { weekday: "long", day: "numeric", month: "long" });
}

function renderStatus(s) {
  const m = s.meta || {};
  document.getElementById("status").innerHTML =
    `<span class="pill"><b>${m.matchesPlayed ?? "–"}</b> / ${m.matchesTotal ?? "–"} matches played</span>` +
    `<span class="pill">Updated <b>${timeAgo(s.generatedAt)}</b></span>`;
}

function teamCard(t) {
  const cls = t.alive ? "team" : "team out";
  const badge = t.alive ? "" : `<span class="badge-out">OUT</span>`;
  return `<div class="${cls}">
      ${flag(t.code, true)}
      <div><div class="tn">${esc(t.name)}${badge}</div><div class="meta">${t.played} played</div></div>
      <div class="tg">${t.goals}</div>
    </div>`;
}

function renderTable(s) {
  const el = document.getElementById("table");
  el.innerHTML = "";
  (s.friends || []).forEach(f => {
    const rkcls = f.rank <= 3 ? " r" + f.rank : "";
    const btn = document.createElement("button");
    btn.className = "row";
    btn.setAttribute("aria-expanded", "false");
    btn.innerHTML =
      `<div class="rankb${rkcls}">${f.rank}</div>` +
      `<div class="pname"><span class="chev">▶</span>${esc(f.name)}</div>` +
      `<div class="goals">${f.totalGoals}<small>goals</small></div>` +
      `<div class="left"><b>${f.teamsLeft}</b> / ${f.teamsTotal}<br>teams left</div>`;
    const detail = document.createElement("div");
    detail.className = "detail";
    detail.innerHTML = `<div class="teamgrid">${(f.teams || []).map(teamCard).join("")}</div>`;
    btn.addEventListener("click", () => {
      const open = detail.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
    });
    el.appendChild(btn);
    el.appendChild(detail);
  });
}

function renderUnassigned(s) {
  const u = s.unassigned;
  if (!u || !u.teamsTotal) return;
  document.getElementById("unassigned-card").style.display = "";
  document.getElementById("unassigned").innerHTML =
    `<div class="fx"><div style="color:var(--muted);font-size:13px;margin:8px 0 12px">` +
    `These teams weren't drawn — their <b style="color:var(--ink)">${u.totalGoals}</b> goals don't count for anyone.</div>` +
    `<div class="teamgrid">${(u.teams || []).map(teamCard).join("")}</div></div>`;
}

function fixtureRow(mt) {
  const ko = localKickoff(mt.date, mt.time);
  const isKO = mt.group == null;
  const owner = o => (o && o !== "TBD") ? `<span class="own">${esc(o)}</span>` : "";
  const stage = isKO ? `<span class="stage ko">${esc(mt.round)}</span>` : `<span class="stage">${esc(mt.group)}</span>`;
  let right;
  if (mt.played) {
    right = `<div class="score">${mt.score1}–${mt.score2}` + (mt.pens ? `<span class="pens">pens ${esc(mt.pens)}</span>` : ``) + `</div>`;
  } else {
    right = `<div class="score vs">vs</div>`;
  }
  return `<div class="fixrow">
      <div class="fxtime">${ko || ""}<br>${stage}</div>
      <div class="teams2">
        <div class="tl">${flag(mt.code1)} <span>${esc(mt.team1)}</span> ${owner(mt.owner1)}</div>
        <div class="tl">${flag(mt.code2)} <span>${esc(mt.team2)}</span> ${owner(mt.owner2)}</div>
      </div>
      ${right}
    </div>`;
}

function renderFixtures(feed) {
  const el = document.getElementById("fixtures");
  const today = localDateStr(new Date());
  let list = feed.matches.filter(m => m.date === today);
  let title = "Today's fixtures";
  if (list.length === 0) {
    const upcoming = feed.matches.filter(m => m.date > today).map(m => m.date).sort();
    if (upcoming.length) {
      const next = upcoming[0];
      list = feed.matches.filter(m => m.date === next);
      title = "Next up · " + fmtDate(next);
    }
  } else {
    title = "Today · " + fmtDate(today);
  }
  document.getElementById("fxtitle").textContent = title;
  if (list.length === 0) { el.innerHTML = `<div class="empty">No more fixtures — tournament complete.</div>`; return; }
  list.sort((a, b) => (a.time || "").localeCompare(b.time || "") || a.num - b.num);
  el.innerHTML = list.map(fixtureRow).join("");
}

Promise.all([
  fetch("./data/standings.json" + bust, opts).then(r => r.json()),
  fetch("./data/matches.json" + bust, opts).then(r => r.json())
]).then(([standings, matches]) => {
  renderStatus(standings);
  renderFixtures(matches);
  renderTable(standings);
  renderUnassigned(standings);
}).catch(err => {
  document.getElementById("table").innerHTML =
    `<div class="err">Couldn't load the data. If you just published, give it a minute and refresh.<br><small>${esc(err.message || err)}</small></div>`;
  document.getElementById("fixtures").innerHTML = "";
});
</script>
</body>
</html>
